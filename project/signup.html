<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-Up Page</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <form class="form-box">
            <img src="./img/full-logo.png" alt="Logo" class="logo">
            <h2>Hello New User,</h2>
            <p>Sign-Up to continue</p>
            <div class="input-row">
                <input type="text" placeholder="First Name" required>
                <input type="text" placeholder="Last Name" required>
            </div>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <input type="password" placeholder="Confirm Password" required>
            <button class="btn primary-btn" type="submit">Sign up</button>
            <div class="social-buttons">
                <button class="btn google-btn" type="button" onclick="handleGoogleLogin()"><i class="fab fa-google"></i> Login with Google</button>
                <button class="btn facebook-btn" type="button" onclick="handleFacebookLogin()"><i class="fab fa-facebook"></i> Login with Facebook</button>
            </div>
            <p>If a existing user, <a href="./login.html">Login</a></p>
        </form>
    </div>
    <script src="./login.js"></script
</body>
</html>
